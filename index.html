<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dinners</title>
  <style>
    :root {
      --bg: #fff8ed;
      --card: #ffffff;
      --ink: #3f332b;
      --muted: #75695f;
      --accent: #8ea879;
      --accent-soft: #e5efd9;
      --border: #eadfce;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1rem 1.5rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
    }

    .intro {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.85rem 1rem;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.1rem;
      box-shadow: 0 12px 30px rgba(63, 51, 43, 0.06);
    }

    article h2 {
      margin: 0 0 0.65rem;
      font-size: 1.25rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 0.75rem;
    }

    .chip {
      display: inline-flex;
      border-radius: 999px;
      padding: 0.25rem 0.6rem;
      background: var(--accent-soft);
      color: #49613e;
      font-size: 0.85rem;
    }

    .section-title {
      margin: 0.8rem 0 0.25rem;
      font-weight: 700;
      font-size: 0.92rem;
    }

    p {
      margin: 0 0 0.45rem;
      color: var(--muted);
    }

    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dinners</h1>
    <p class="intro">A tiny, practical dinner library for cheap stretch meals, freezer prep, gluten-free/dairy-free safety notes, and flexible household swaps.</p>
  </header>

  <main>
    <div class="toolbar" aria-label="Dinner filters">
      <input id="search" type="search" placeholder="Search dinners, ingredients, or notes..." />
      <select id="filter">
        <option value="all">All dinners</option>
        <option value="angel">Angel-safe notes</option>
        <option value="freezer">Freezer/prep friendly</option>
        <option value="household">Household swaps</option>
      </select>
    </div>

    <section id="dinnerGrid" class="grid" aria-live="polite"></section>
  </main>

  <footer>
    <span id="updated"></span>
  </footer>

  <script>
    const grid = document.querySelector('#dinnerGrid');
    const search = document.querySelector('#search');
    const filter = document.querySelector('#filter');
    const updated = document.querySelector('#updated');
    let dinners = [];

    function textForDinner(dinner) {
      return [
        dinner.name,
        ...(dinner.base || []),
        ...(dinner.optional_proteins || []),
        dinner.angel_safe_notes,
        dinner.household_notes,
        dinner.prep_notes
      ].join(' ').toLowerCase();
    }

    function matchesFilter(dinner) {
      if (filter.value === 'angel') return Boolean(dinner.angel_safe_notes);
      if (filter.value === 'freezer') return /freeze|freezer|portion|batch|prep/i.test(dinner.prep_notes || '');
      if (filter.value === 'household') return Boolean(dinner.household_notes);
      return true;
    }

    function render() {
      const term = search.value.trim().toLowerCase();
      const visible = dinners.filter((dinner) => matchesFilter(dinner) && textForDinner(dinner).includes(term));

      grid.innerHTML = visible.map((dinner) => `
        <article>
          <h2>${dinner.name}</h2>
          <div class="chips">
            ${(dinner.base || []).map((item) => `<span class="chip">${item}</span>`).join('')}
          </div>
          ${(dinner.optional_proteins || []).length ? `
            <p class="section-title">Optional protein</p>
            <p>${dinner.optional_proteins.join(', ')}</p>
          ` : ''}
          <p class="section-title">Angel-safe notes</p>
          <p>${dinner.angel_safe_notes}</p>
          <p class="section-title">Household notes</p>
          <p>${dinner.household_notes}</p>
          <p class="section-title">Prep notes</p>
          <p>${dinner.prep_notes}</p>
        </article>
      `).join('') || '<p>No dinners match that search yet.</p>';
    }

    fetch('./data/dinners.json')
      .then((response) => {
        if (!response.ok) throw new Error('Could not load dinners.json');
        return response.json();
      })
      .then((data) => {
        dinners = data.dinners || [];
        updated.textContent = data.updated ? `Last updated: ${data.updated}` : '';
        render();
      })
      .catch((error) => {
        grid.innerHTML = `<p>${error.message}</p>`;
      });

    search.addEventListener('input', render);
    filter.addEventListener('change', render);
  </script>
</body>
</html>
