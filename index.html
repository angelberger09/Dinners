<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dinners</title>
  <style>
    :root {
      --bg: #fff8ed;
      --card: #ffffff;
      --ink: #3f332b;
      --muted: #75695f;
      --accent: #8ea879;
      --accent-dark: #49613e;
      --accent-soft: #e5efd9;
      --warm: #f7dfc6;
      --border: #eadfce;
      --shadow: rgba(63, 51, 43, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1rem 1.5rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
    }

    .intro {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, auto);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.85rem 1rem;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    article {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.1rem;
      box-shadow: 0 12px 30px var(--shadow);
    }

    article h2 {
      margin: 0 0 0.45rem;
      font-size: 1.25rem;
    }

    .type {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 0.18rem 0.6rem;
      background: var(--warm);
      color: var(--ink);
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.65rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0 0.75rem;
    }

    .chip {
      display: inline-flex;
      border-radius: 999px;
      padding: 0.25rem 0.6rem;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 0.85rem;
    }

    .section-title {
      margin: 0.8rem 0 0.25rem;
      font-weight: 700;
      font-size: 0.92rem;
    }

    p {
      margin: 0 0 0.45rem;
      color: var(--muted);
    }

    details {
      margin-top: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fffdf8;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 0.7rem 0.85rem;
      font-weight: 700;
      color: var(--accent-dark);
    }

    details ul {
      margin: 0;
      padding: 0 1.1rem 0.9rem 2rem;
      color: var(--muted);
    }

    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Dinners</h1>
    <p class="intro">A tiny practical meal library for cheap stretch meals, gluten-free dinner planning, easy lunches, breakfast backups, snacks, and flexible household swaps.</p>
  </header>

  <main>
    <div class="toolbar" aria-label="Meal filters">
      <input id="search" type="search" placeholder="Search meals, ingredients, or notes..." />
      <select id="filter">
        <option value="all">All meals</option>
        <option value="dinner">Dinners</option>
        <option value="lunch">Easy lunches</option>
        <option value="breakfast">Easy breakfasts</option>
        <option value="snack">Snacks</option>
        <option value="angel">Angel-safe notes</option>
        <option value="freezer">Freezer/prep friendly</option>
        <option value="household">Household swaps</option>
      </select>
    </div>

    <section id="mealGrid" class="grid" aria-live="polite"></section>
  </main>

  <footer>
    <span id="updated"></span>
  </footer>

  <script>
    const grid = document.querySelector('#mealGrid');
    const search = document.querySelector('#search');
    const filter = document.querySelector('#filter');
    const updated = document.querySelector('#updated');

    const plannedMeals = [
      {
        id: 'pork-bean-chili',

        prep_notes: 'Freezes well in flat bags or containers.'
      },

      },
      {

        angel_safe_notes: 'Make sauce and crust gluten-free; watch cross-contact with regular bread/tortillas.',
        household_notes: 'Cabot cheddar can add more real-cheese flavor for everyone who tolerates it.',
        prep_notes: 'Par-bake crusts or freeze dough portions for easier pizza night.'
      },
      {
        id: 'skillet-night',
        type: 'dinner',
        name: 'Skillet Night',
        base: ['rice or potatoes', 'frozen veg', 'pork or bacon', 'cheese'],
        ingredients: ['cooked rice or par-cooked potatoes', 'frozen mixed vegetables', 'shredded pork', 'bacon or turkey bacon', 'cheese', 'eggs if wanted'],
        angel_safe_notes: 'Keep egg optional and use gluten-free seasonings.',
        household_notes: 'Good use-the-random-bits meal with eggs added only for people who want them.',
        prep_notes: 'Prep potatoes, rice, pork, and bacon ahead; assemble fresh in a skillet.'
      },
      {
        id: 'soup-night',
        type: 'dinner',
        name: 'Soup Night',
        base: ['broth', 'rice', 'mixed veg', 'pork'],
        ingredients: ['pork broth or bouillon', 'rice', 'frozen mixed vegetables', 'shredded pork', 'beans or potatoes'],
        angel_safe_notes: 'Use gluten-free bouillon and keep rice separate if texture matters.',
        household_notes: 'Simple mild soup base that can be dressed up per bowl.',
        prep_notes: 'Freeze soup base without rice for best texture.'
      },
      {
        id: 'pasta-night',
        type: 'dinner',
        name: 'Pasta Night',
        base: ['GF pasta', 'regular pasta if needed', 'red sauce', 'breadsticks'],
        ingredients: ['gluten-free pasta', 'regular pasta for others if needed', 'red sauce base', 'garlic breadsticks', 'cheese', 'optional pork or vegetables'],
        angel_safe_notes: 'Cook GF pasta separately with clean tools and a separate strainer.',
        household_notes: 'Regular pasta can be used for the others if needed.',
        prep_notes: 'Make sauce ahead; cook pasta fresh.'
      },
      {
        id: 'corn-tortilla-pizza-quesadillas',
        type: 'lunch',
        name: 'Corn Tortilla Pizza Quesadillas',
        base: ['corn tortillas', 'sauce', 'cheese', 'pepperoni/bacon'],
        ingredients: ['corn tortillas', 'red sauce or pizza sauce', 'shredded cheese', 'pepperoni', 'bacon or turkey bacon'],
        angel_safe_notes: 'Use corn tortillas and gluten-free toppings.',
        household_notes: 'Easy lunch pizza option without making a full crust.',
        prep_notes: 'Keep as a small kit and pan-toast fresh.'
      },
      {
        id: 'bean-cheese-tacos',
        type: 'lunch',
        name: 'Bean and Cheese Tacos',
        base: ['corn tortillas', 'beans', 'cheese', 'salsa'],
        ingredients: ['corn tortillas', 'cooked beans', 'cheese', 'salsa', 'cumin or taco seasoning'],
        angel_safe_notes: 'Use corn tortillas and safe seasonings.',
        household_notes: 'Can be kept mild and assembled per person.',
        prep_notes: 'Cook beans ahead; assemble fresh so tortillas stay better.'
      },
      {
        id: 'tuna-rice-bowl',
        type: 'lunch',
        name: 'Tuna Rice Bowl',

        ingredients: ['tuna', 'cooked rice', 'frozen or cooked vegetables', 'bouillon', 'salsa'],
        angel_safe_notes: 'Use gluten-free bouillon and keep tuna separate until serving.',
        household_notes: 'Crimson does not like tuna, so add tuna after his portion is pulled.',

      },
      {
        id: 'chickpea-lunch-bowl',
        type: 'lunch',
        name: 'Chickpea Snack/Lunch Bowl',
        base: ['chickpeas', 'rice', 'veg', 'seasonings'],
        ingredients: ['chickpeas', 'cooked rice', 'frozen or cooked vegetables', 'garlic powder', 'onion powder', 'cumin or Italian seasoning', 'salsa or red sauce'],
        angel_safe_notes: 'Naturally gluten-free if chickpeas and seasonings are safe.',
        household_notes: 'Can go taco-style, garlic-bouillon style, or pizza-ish.',
        prep_notes: 'Store chickpeas plain; pan-crisp fresh if you have energy.'
      },
      {
        id: 'tuna-pasta',
        type: 'lunch',
        name: 'Tuna Pasta',
        base: ['pasta', 'tuna', 'veg', 'sauce'],
        ingredients: ['gluten-free pasta for Angel', 'regular pasta for others if needed', 'tuna', 'vegetables', 'red sauce or cheesy bouillon sauce'],
        angel_safe_notes: 'Cook GF pasta separately and add tuna after Crimson’s portion is scooped.',
        household_notes: 'Crimson can take the no-tuna portion first.',
        prep_notes: 'Cook pasta fresh; prep sauce/veg ahead.'
      },
      {
        id: 'pb-toast-sandwiches',
        type: 'lunch',
        name: 'PB Toast/Sandwiches for Others',
        base: ['bread', 'peanut butter'],
        ingredients: ['regular bread', 'peanut butter'],
        angel_safe_notes: 'Not gluten-free if made with regular bread; keep separate from GF prep.',
        household_notes: 'Fast emergency food for the non-GF folks.',
        prep_notes: 'Can pre-make a few sandwiches and fridge or freeze individually.'
      },
      {
        id: 'oatmeal-brown-sugar',
        type: 'breakfast',
        name: 'Oatmeal with Brown Sugar',
        base: ['oats', 'brown sugar', 'almond milk'],
        ingredients: ['gluten-free oats', 'brown sugar', 'almond milk', 'peanut butter or pumpkin if wanted'],
        angel_safe_notes: 'Use certified gluten-free oats.',
        household_notes: 'Easy breakfast station for anyone awake first.',
        prep_notes: 'Portion dry oats and brown sugar into jars or bags.'
      },
      {
        id: 'breakfast-potatoes-skillet',
        type: 'breakfast',
        name: 'Breakfast Potatoes/Skillet',
        base: ['potatoes', 'bacon/turkey bacon', 'veg', 'optional egg'],
        ingredients: ['par-cooked potato cubes or wedges', 'bacon or turkey bacon', 'frozen vegetables', 'cheese', 'eggs if wanted'],
        angel_safe_notes: 'Keep eggs optional for Angel and use gluten-free seasonings.',
        household_notes: 'Best fresh-assembled instead of frozen as a finished bowl.',
        prep_notes: 'Par-cook potatoes, dry well, tray-freeze, then cook fresh from frozen.'
      },
      {
        id: 'egg-wraps',
        type: 'breakfast',
        name: 'Egg Wraps for the Other 3',
        base: ['eggs', 'cheese', 'bacon/turkey bacon', 'flour tortilla'],
        ingredients: ['eggs', 'cheese', 'bacon or turkey bacon', 'flour tortillas'],
        angel_safe_notes: 'Not Angel’s breakfast and not gluten-free if flour tortillas are used.',
        household_notes: 'Good grab-and-go breakfast for the other 3 adults.',
        prep_notes: 'Wrap individually; fridge 3–4 days or freeze extras.'
      },
      {
        id: 'rice-bowl-breakfast',
        type: 'breakfast',
        name: 'Leftover Rice Bowl with Pork/Beans',
        base: ['rice', 'pork', 'beans', 'salsa'],
        ingredients: ['cooked rice', 'shredded pork', 'cooked beans', 'salsa', 'cheese if wanted'],
        angel_safe_notes: 'Good gluten-free option when breakfast food sounds bad.',
        household_notes: 'Works as breakfast, lunch, or emergency dinner.',
        prep_notes: 'Portion rice, pork, and beans separately for flexible reheating.'
      },
      {
        id: 'pb-tortillas-bread',
        type: 'snack',
        name: 'Peanut Butter Tortillas or PB Bread',
        base: ['peanut butter', 'tortillas or bread'],
        ingredients: ['peanut butter', 'corn tortillas for GF option', 'regular bread or flour tortillas for others'],
        angel_safe_notes: 'Use corn tortillas for a gluten-free snack option.',
        household_notes: 'Regular bread/tortillas are for the non-GF folks.',
        prep_notes: 'Keep peanut butter easy-access and separate from regular bread crumbs.'
      },
      {
        id: 'cheese-corn-tortillas',
        type: 'snack',
        name: 'Cheese + Corn Tortillas',
        base: ['cheese', 'corn tortillas'],
        ingredients: ['corn tortillas', 'cheese', 'salsa if wanted'],
        angel_safe_notes: 'Gluten-free if tortillas and toppings are safe.',
        household_notes: 'Fast tiny quesadilla or roll-up snack.',
        prep_notes: 'Assemble fresh so tortillas do not get tough or soggy.'
      },
      {
        id: 'popsicles-ice-pops',
        type: 'snack',
        name: 'Popsicles / Ice Pops',
        base: ['popsicles', 'ice pops'],
        ingredients: ['freezer pops', 'ice pops'],
        angel_safe_notes: 'Check labels if needed for gluten/dairy concerns.',
        household_notes: 'Easy no-prep freezer snack.',
        prep_notes: 'Put away first when groceries arrive so they do not soften.'
      },
      {
        id: 'snacky-oats',
        type: 'snack',
        name: 'Sweet/Snacky Oats',
        base: ['oats', 'brown sugar', 'peanut butter'],
        ingredients: ['gluten-free oats', 'brown sugar', 'almond milk', 'peanut butter', 'pumpkin or cinnamon if wanted'],
        angel_safe_notes: 'Use certified gluten-free oats.',
        household_notes: 'Can be breakfast, snack, or dessert-ish backup.',
        prep_notes: 'Pre-portion dry oats and sweetener if helpful.'
      },
      {
        id: 'crisped-chickpeas',
        type: 'snack',
        name: 'Roasted or Pan-Crisped Chickpeas',
        base: ['chickpeas', 'seasonings'],
        ingredients: ['chickpeas', 'oil', 'salt', 'garlic powder', 'onion powder', 'cumin or paprika'],
        angel_safe_notes: 'Naturally gluten-free if chickpeas and seasonings are safe.',
        household_notes: 'Good crunchy snack when there is enough energy to crisp them.',
        prep_notes: 'Drain and dry well; season after crisping for best texture.'
      },
      {
        id: 'pepperoni-cheese',
        type: 'snack',
        name: 'Pepperoni + Cheese',
        base: ['pepperoni', 'cheese'],
        ingredients: ['pepperoni', 'cheese'],
        angel_safe_notes: 'Check pepperoni label and use tolerated cheese.',
        household_notes: 'Good fast protein snack.',
        prep_notes: 'Portion into small containers if helpful.'
      },
      {
        id: 'mac-cheese-backup',
        type: 'snack',
        name: 'Mac and Cheese Backup for the Other 3',
        base: ['boxed mac and cheese'],
        ingredients: ['boxed mac and cheese', 'bacon or turkey bacon', 'frozen veg if wanted'],
        angel_safe_notes: 'Not gluten-free; keep separate from Angel’s prep tools.',
        household_notes: 'Quick meal/snack for the other 3.',
        prep_notes: 'Store boxes together as an emergency backup.'
      }
    ];

    let meals = plannedMeals;

    function normalizeDinner(dinner) {
      return {
        ...dinner,
        type: 'dinner',
        ingredients: dinner.ingredients || [
          ...(dinner.base || []),
          ...(dinner.optional_proteins || [])
        ]
      };
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function textForMeal(meal) {
      return [
        meal.type,
        meal.name,
        ...(meal.base || []),
        ...(meal.ingredients || []),
        ...(meal.optional_proteins || []),
        meal.angel_safe_notes,
        meal.household_notes,
        meal.prep_notes
      ].join(' ').toLowerCase();
    }

    function matchesFilter(meal) {
      if (['dinner', 'lunch', 'breakfast', 'snack'].includes(filter.value)) return meal.type === filter.value;
      if (filter.value === 'angel') return Boolean(meal.angel_safe_notes);
      if (filter.value === 'freezer') return /freeze|freezer|portion|batch|prep|par-cook|par-bake|fridge/i.test(meal.prep_notes || '');
      if (filter.value === 'household') return Boolean(meal.household_notes);
      return true;
    }

    function render() {
      const term = search.value.trim().toLowerCase();
      const visible = meals.filter((meal) => matchesFilter(meal) && textForMeal(meal).includes(term));

      grid.innerHTML = visible.map((meal) => `
        <article>
          <span class="type">${escapeHtml(meal.type)}</span>
          <h2>${escapeHtml(meal.name)}</h2>
          <div class="chips">
            ${(meal.base || []).map((item) => `<span class="chip">${escapeHtml(item)}</span>`).join('')}
          </div>
          ${(meal.optional_proteins || []).length ? `
            <p class="section-title">Optional protein</p>
            <p>${escapeHtml(meal.optional_proteins.join(', '))}</p>
          ` : ''}
          <p class="section-title">Angel-safe notes</p>
          <p>${escapeHtml(meal.angel_safe_notes)}</p>
          <p class="section-title">Household notes</p>
          <p>${escapeHtml(meal.household_notes)}</p>
          <p class="section-title">Prep notes</p>
          <p>${escapeHtml(meal.prep_notes)}</p>
          <details>
            <summary>Ingredients / pull from</summary>
            <ul>
              ${(meal.ingredients || []).map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
            </ul>
          </details>
        </article>
      `).join('') || '<p>No meals match that search yet.</p>';
    }

    fetch('./data/dinners.json')
      .then((response) => {
        if (!response.ok) throw new Error('Could not load dinners.json');
        return response.json();
      })
      .then((data) => {
        const savedDinners = (data.dinners || []).map(normalizeDinner);
        const savedIds = new Set(savedDinners.map((meal) => meal.id));
        meals = [
          ...plannedMeals,
          ...savedDinners.filter((meal) => !savedIds.has(meal.id) && !plannedMeals.some((planned) => planned.id === meal.id))
        ];
        updated.textContent = data.updated ? `Last updated: ${data.updated}` : 'Last updated: 2026-06-14';
        render();
      })
      .catch(() => {
        updated.textContent = 'Last updated: 2026-06-14';
        render();
      });

    search.addEventListener('input', render);
    filter.addEventListener('change', render);
    render();
  </script>
</body>
</html>
